<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Ride Duration Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <div class="card fade-in">
            <h1 class="title">Duration Predictor.</h1>
            <p class="subtitle">Estimate your Uber ride duration in seconds</p>
            
            <form id="prediction-form">
                <div class="form-group slide-up" style="animation-delay: 0.1s;">
                    <label for="pickup_datetime">Pickup Date & Time</label>
                    <input type="datetime-local" id="pickup_datetime" name="pickup_datetime" required>
                </div>
                
                <div class="form-group slide-up" style="animation-delay: 0.2s;">
                    <label for="trip_distance">Trip Distance (miles)</label>
                    <input type="number" id="trip_distance" name="trip_distance" step="0.1" min="0.1" placeholder="e.g. 3.5" required>
                </div>
                
                <div class="form-group slide-up" style="animation-delay: 0.3s;">
                    <label for="passenger_count">Passenger Count</label>
                    <input type="number" id="passenger_count" name="passenger_count" min="1" max="10" placeholder="e.g. 2" required>
                </div>
                
                <div class="submit-container slide-up" style="animation-delay: 0.4s;">
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Predict Duration</span>
                        <div class="spinner hidden"></div>
                    </button>
                </div>
            </form>
            
            <div id="error-message" class="alert error hidden"></div>
            
            <div id="result-card" class="result-card hidden">
                <h3>Estimated Duration</h3>
                <div class="duration-value"><span id="duration-time">--</span> mins</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('prediction-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const btnText = submitBtn.querySelector('.btn-text');
            const spinner = submitBtn.querySelector('.spinner');
            const errorMessage = document.getElementById('error-message');
            const resultCard = document.getElementById('result-card');
            const durationTime = document.getElementById('duration-time');
            
            // Loading state
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            submitBtn.disabled = true;
            errorMessage.classList.add('hidden');
            resultCard.classList.remove('visible');
            setTimeout(() => resultCard.classList.add('hidden'), 300);
            
            const pickupDatetime = document.getElementById('pickup_datetime').value;
            const tripDistance = document.getElementById('trip_distance').value;
            const passengerCount = document.getElementById('passenger_count').value;
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        pickup_datetime: pickupDatetime,
                        trip_distance: tripDistance,
                        passenger_count: passengerCount
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to predict duration.');
                }
                
                // Show result
                setTimeout(() => {
                    durationTime.textContent = data.predicted_duration;
                    resultCard.classList.remove('hidden');
                    // small delay to allow display flex to apply before adding visible class for CSS transition
                    setTimeout(() => resultCard.classList.add('visible'), 10);
                }, 300);
            } catch (err) {
                errorMessage.textContent = err.message;
                errorMessage.classList.remove('hidden');
            } finally {
                // Reset styling after minimum loading time (for UX)
                setTimeout(() => {
                    btnText.classList.remove('hidden');
                    spinner.classList.add('hidden');
                    submitBtn.disabled = false;
                }, 500);
            }
        });
        
        // Setup initial datetime to current local time for convenience
        window.addEventListener('DOMContentLoaded', () => {
             const now = new Date();
             now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
             document.getElementById('pickup_datetime').value = now.toISOString().slice(0,16);
        });
    </script>
</body>
</html>
